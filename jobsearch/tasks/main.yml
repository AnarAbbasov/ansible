---
# tasks file for jobsearch
- name: create data directory
  ansible.builtin.file:
    path: "{{home_dir}}/jobsearch/www/data"
    state: directory
    mode: '0777'

- name: install sqlite
  ansible.builtin.package:
    name: sqlite.x86_64 
    state: present

- name: Create database file if missing
  command: 'sqlite3 {{home_dir}}/jobsearch/www/data/jobsearch.db ""'
           
- name: Set permissions on database file
  ansible.builtin.file:
    path: '{{home_dir}}/jobsearch/www/data/jobsearch.db'
    mode: '0666'

- name: Create logs table
  shell: |
        sqlite3 {{home_dir}}/jobsearch/www/data/jobsearch.db "
        CREATE TABLE IF NOT EXISTS logs (
            id INTEGER PRIMARY KEY AUTOINCREMENT,
            date TEXT,
            employer TEXT,
            position TEXT,
            method TEXT,
            contact_person TEXT,
            contact_info TEXT,
            outcome TEXT,
            notes TEXT,
            timestamp TEXT DEFAULT CURRENT_TIMESTAMP
        );
        "

- name: remove previous docker compose if exists
  ansible.builtin.file:
    path: /home/ansible/jobsearch/podman-compose.yml
    state: absent


- name: Download a file from GitHub
  get_url:
    url: "https://raw.githubusercontent.com/Anarabbasov/jobsearch/main/podman-compose.yml"
    dest: "{{home_dir}}/jobsearch" 


- name: Replace docker image version
  ansible.builtin.replace:
    path: "{{home_dir}}/jobsearch/podman-compose.yml"
    regexp: 'anarabbasov/jobster:0.0.1'
    replace: "anarabbasov/jobster:{{version_to_deploy}}"

- name: Install python3-pip
  ansible.builtin.dnf:
    name: python3-pip
    state: present

- name: Install podman-compose via pip
  ansible.builtin.pip:
    name: podman-compose
    executable: pip3

- name: Configure Podman to use docker.io as default registry
  ansible.builtin.copy:
    dest: /etc/containers/registries.conf
    content: |
      unqualified-search-registries = ["docker.io", "registry.access.redhat.com", "registry.redhat.io"]

      [[registry]]
      prefix = "docker.io"
      location = "registry-1.docker.io"
    owner: root
    group: root
    mode: '0644'


- name: Ensure SELinux policy tools are installed
  ansible.builtin.package:
    name: policycoreutils-python-utils
    state: present

- name: Set SELinux context for container-writable data directory
  ansible.builtin.command: >
    semanage fcontext -a -t container_var_lib_t "{{home_dir}}/jobsearch/www/data(/.*)?"
    
- name: Restore SELinux context on data directory
  ansible.builtin.command: >
    restorecon -Rv "{{home_dir}}/jobsearch/www/data"
  


- name: Start services with podman-compose
  ansible.builtin.shell: |
    cd "{{home_dir}}/jobsearch"; /usr/local/bin/podman-compose up -d 
  become: yes
  
- name: Open port 8081/tcp in firewalld
  ansible.posix.firewalld:
    service: http
    permanent: true
    state: enabled
    immediate: yes
